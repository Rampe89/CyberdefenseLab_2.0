        consoleDiv.innerText += binaryString.charAt(index);
        index++;
        setTimeout(typeBinary, 80);
      } else {
        // Wenn der Binärcode fertig ist, hänge das ASCII-Art an
        consoleDiv.innerText += "\n\n" + asciiArt;
      }
    }

    // Starte den Prozess nach dem Laden
    window.onload = () => {
      // Erst mal nichts, nur leere Konsole – 
      // nach 1 Sekunde fangen wir an, den Binärcode zu tippen
      setTimeout(typeBinary, 1000);
    };
  </script>
