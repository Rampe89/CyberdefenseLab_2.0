<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Versteckter Button</title>
</head>
<body>

<p>Irgendetwas fehlt hier... 🤔</p>
<p style="font-size: 0.9em; color: #888;">
Tipp: Nur weil du etwas nicht siehst, heißt das nicht, dass es nicht da ist.
</p>

<button id="secret-btn" style="display:none;" onclick="revealFlag()">
Klick mich
</button>

<p id="flag-output" style="margin-top: 10px; font-weight: bold;"></p>

<script>
function revealFlag() {
    document.getElementById("flag-output").innerText = "FLAG{CSS_HIDDEN_BUTTON}";
}
</script>

</body>
</html>
