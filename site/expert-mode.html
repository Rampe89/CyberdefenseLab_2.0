<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expert Mode</title>
  <link rel="stylesheet" href="assets/cdl-unified.css">
  <style>
    body { margin: 0; font-family: Consolas, Monaco, monospace; background: #050c14; color: #9ff59f; }
    .shell-wrap { width: min(1200px, calc(100% - 24px)); margin: 20px auto; padding: 0; border-radius: 20px; overflow: hidden; border: 1px solid rgba(124,227,255,.16); box-shadow: 0 20px 40px rgba(0,0,0,.35); }
    .shell-top { display:flex; justify-content:space-between; align-items:center; gap:12px; padding:14px 18px; background:#07131e; border-bottom:1px solid rgba(124,227,255,.12); color:#d7e8fb; font-family: Arial, sans-serif; }
    .shell-top a { color:#7ce3ff; text-decoration:none; }
    .terminal { min-height: 72vh; max-height: 80vh; overflow-y: auto; padding: 18px; background: linear-gradient(180deg, #07131e, #0a1824); }
    .line { margin:0 0 8px 0; white-space:pre-wrap; word-break:break-word; }
    .prompt { color:#7ce3ff; }
    .terminal-input { background: transparent !important; border: none !important; outline: none; color: #9ff59f !important; font-family: Consolas, Monaco, monospace; font-size: 1rem; width: calc(100% - 200px); box-shadow: none !important; padding: 0 !important; }
    .locked-card { width:min(860px, calc(100% - 24px)); margin:40px auto; background:rgba(255,255,255,.95); color:#10202f; padding:24px; border-radius:20px; border:1px solid rgba(19,61,93,.12); box-shadow:0 18px 40px rgba(0,0,0,.22); font-family: Arial, sans-serif; }
    @media (max-width: 640px){ .terminal-input{ width:100% !important; margin-top:6px; } .terminal{ min-height:68vh; } .shell-top{ flex-direction:column; align-items:flex-start; } }
  </style>
</head>
<body>
  <div id="locked" class="locked-card" style="display:none;">
    <h1>Expert Mode gesperrt</h1>
    <p>Der Expert Mode wird erst freigeschaltet, wenn der Linux-Grundkurs erfolgreich abgeschlossen wurde.</p>
    <p><a href="linux-lab.html">Zum Linux-Kurs</a></p>
  </div>

  <div id="shell" class="shell-wrap" style="display:none;">
    <div class="shell-top">
      <div><strong>Expert Mode</strong></div>
      <div><a href="index.html">Startseite</a> · <a href="linux-lab.html">Linux Kurs</a></div>
    </div>
    <div class="terminal" id="terminal"></div>
  </div>

  <script>
    const unlocked = localStorage.getItem('linuxLabSolved') === 'true';
    const lockedCard = document.getElementById('locked');
    const shell = document.getElementById('shell');
    const terminal = document.getElementById('terminal');
    let commandHistory = [];
    let historyIndex = -1;
    let currentPath = '/lab';
    const fs = {
      '/': ['lab'],
      '/lab': ['labs', 'notes', '.cache', 'README.md'],
      '/lab/labs': ['bruteforce.txt', 'phishing.txt', 'robots.txt', 'sql.txt', 'social.txt', 'linux.txt', 'dirbuster.txt', 'hash.txt'],
      '/lab/notes': ['operators.md', 'progress.log'],
      '/lab/.cache': ['session.txt', '.deep'],
      '/lab/.cache/.deep': ['easter-egg.txt']
    };
    const files = {
      '/lab/README.md': 'Expert Mode: reduzierte Oberfläche, mehr Eigensteuerung. Nutze help und arbeite systematisch.',
      '/lab/labs/bruteforce.txt': 'Alias: bruteforce -> bruteforce.html',
      '/lab/labs/phishing.txt': 'Alias: phishing -> phishingquiz.html',
      '/lab/labs/robots.txt': 'Alias: robots -> robots-lab.html',
      '/lab/labs/sql.txt': 'Alias: sql -> sql-lab.html',
      '/lab/labs/social.txt': 'Alias: social -> social-engineering.html',
      '/lab/labs/linux.txt': 'Alias: linux -> linux-lab.html',
      '/lab/labs/dirbuster.txt': 'Alias: dirbuster -> dirbuster.html',
      '/lab/labs/hash.txt': 'Alias: hash -> hash.html',
      '/lab/notes/operators.md': 'Hinweis: pwd, ls -a, cat, find und history sind oft nützlicher als hektisches Klicken.',
      '/lab/notes/progress.log': `linuxLabSolved=true
expertMode=ready
flagsource=localStorage`,
      '/lab/.cache/session.txt': 'cached shortcuts loaded',
      '/lab/.cache/.deep/easter-egg.txt': 'Kein zusätzlicher Punkt, aber Respekt fürs Suchen.'
    };
    const labMap = {
      bruteforce: 'bruteforce.html',
      phishing: 'phishingquiz.html',
      robots: 'robots-lab.html',
      linux: 'linux-lab.html',
      sql: 'sql-lab.html',
      social: 'social-engineering.html',
      dirbuster: 'dirbuster.html',
      hash: 'hash.html'
    };

    function print(text = '') {
      const line = document.createElement('div');
      line.className = 'line';
      line.textContent = text;
      terminal.appendChild(line);
      terminal.scrollTop = terminal.scrollHeight;
    }

    function normalisePath(base, target) {
      if (!target) return base;
      if (target === '/') return '/';
      const parts = (target.startsWith('/') ? target : (base === '/' ? '/' + target : base + '/' + target)).split('/');
      const stack = [];
      for (const part of parts) {
        if (!part || part === '.') continue;
        if (part === '..') stack.pop();
        else stack.push(part);
      }
      return '/' + stack.join('/');
    }

    function focusActiveInput() {
      const inputs = terminal.querySelectorAll('.terminal-input');
      const last = inputs[inputs.length - 1];
      if (last) last.focus();
    }

    function clearTerminal() {
      terminal.innerHTML = '';
    }

    function addPrompt() {
      const line = document.createElement('div');
      line.className = 'line';
      const prompt = document.createElement('span');
      prompt.className = 'prompt';
      prompt.textContent = 'expert@cyberlab:' + currentPath + ' $ ';
      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'terminal-input';
      input.autocomplete = 'off';
      input.spellcheck = false;
      input.setAttribute('aria-label', 'Terminal Eingabe');
      input.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowUp') {
          e.preventDefault();
          if (!commandHistory.length) return;
          if (historyIndex < commandHistory.length - 1) historyIndex++;
          input.value = commandHistory[commandHistory.length - 1 - historyIndex] || '';
          return;
        }
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          if (!commandHistory.length) return;
          if (historyIndex > 0) {
            historyIndex--;
            input.value = commandHistory[commandHistory.length - 1 - historyIndex] || '';
          } else {
            historyIndex = -1;
            input.value = '';
          }
          return;
        }
        if (e.key === 'Enter') {
          e.preventDefault();
          const value = input.value.trim();
          input.disabled = true;
          input.readOnly = true;
          if (value) {
            commandHistory.push(value);
            historyIndex = -1;
          }
          handle(value);
          addPrompt();
        }
      });
      line.appendChild(prompt);
      line.appendChild(input);
      terminal.appendChild(line);
      focusActiveInput();
    }

    function handle(cmd) {
      const raw = (cmd || '').trim();
      const normalized = raw.toLowerCase();
      if (!normalized) return;
      const [base, ...rest] = raw.split(/\s+/);
      const baseLc = base.toLowerCase();
      if (normalized === 'help') {
        print('Befehle: help, pwd, ls, ls -a, cd, cat, whoami, history, find . -name <datei>, labs, open <name>, status, clear, exit');
        print('Beispiel: cat README.md oder open linux');
        return;
      }
      if (normalized === 'pwd') { print(currentPath); return; }
      if (normalized === 'ls') { print((fs[currentPath] || []).filter(entry => !entry.startsWith('.')).join('  ')); return; }
      if (normalized === 'ls -a') { print(['.', '..', ...(fs[currentPath] || [])].join('  ')); return; }
      if (baseLc === 'cd') {
        const target = rest[0];
        if (!target) { print('Wohin möchtest du wechseln?'); return; }
        const next = normalisePath(currentPath, target);
        if (fs[next]) currentPath = next; else print('Verzeichnis nicht gefunden.');
        return;
      }
      if (baseLc === 'cat') {
        const target = rest.join(' ');
        if (!target) { print('Welche Datei möchtest du anzeigen?'); return; }
        const path = normalisePath(currentPath, target);
        if (fs[path]) { print('Das ist ein Verzeichnis.'); return; }
        if (files[path]) print(files[path]); else print('Datei nicht gefunden.');
        return;
      }
      if (normalized === 'whoami') { print('expert'); return; }
      if (normalized === 'history') {
        if (!commandHistory.length) print('Noch keine Befehle im Verlauf.'); else commandHistory.forEach((entry, idx) => print((idx + 1) + '  ' + entry));
        return;
      }
      if (baseLc === 'find') {
        const args = rest;
        if (args[0] !== '.' || args[1] !== '-name' || !args[2]) { print('Verwendung: find . -name DATEI'); return; }
        const needle = args.slice(2).join(' ');
        const matches = Object.keys(files).concat(Object.keys(fs)).filter(path => (path.startsWith(currentPath + '/') || path === currentPath) && path.split('/').pop() === needle);
        if (!matches.length) print('Keine Treffer'); else matches.forEach(match => print(match.replace(currentPath, '.') || '.'));
        return;
      }
      if (normalized === 'labs') { print('Verfügbare Labs: ' + Object.keys(labMap).join(', ')); return; }
      if (baseLc === 'open') {
        const target = (rest[0] || '').toLowerCase();
        if (!target) { print('Welches Lab möchtest du öffnen?'); return; }
        if (!labMap[target]) { print('Unbekanntes Lab. Nutze: labs'); return; }
        print('Öffne ' + target + ' ...');
        window.location.href = labMap[target];
        return;
      }
      if (normalized === 'status') {
        let flags = [];
        try { flags = JSON.parse(localStorage.getItem('collectedFlags') || '[]'); } catch (err) { flags = []; }
        const count = Array.isArray(flags) ? flags.filter(Boolean).length : 0;
        print('Linux-Kurs: abgeschlossen');
        print('Expert Mode: aktiv');
        print('Gesammelte Flags: ' + count + '/18');
        return;
      }
      if (normalized === 'clear') { clearTerminal(); return; }
      if (normalized === 'exit') { window.location.href = 'index.html'; return; }
      print('Befehl nicht gefunden. Nutze help.');
    }

    document.addEventListener('click', () => { focusActiveInput(); });

    if (!unlocked) {
      lockedCard.style.display = 'block';
    } else {
      shell.style.display = 'block';
      print('Expert Mode aktiviert.');
      print('Diese Ansicht ist bewusst reduzierter und stärker terminalorientiert.');
      print('Nutze help für die verfügbaren Befehle und arbeite dich systematisch vor.');
      print('Mit labs siehst du die Kurzbefehle für die wichtigsten Seiten.');
      print('');
      addPrompt();
    }
  </script>
</body>
</html>
