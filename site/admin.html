  <style id="static-lab-shell">
    .static-topbar {
      width: min(1100px, calc(100% - 24px));
      margin: 20px auto 16px auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 16px;
      background: rgba(7, 19, 30, 0.92);
      border: 1px solid rgba(124,227,255,.12);
      box-shadow: 0 14px 30px rgba(0,0,0,.18);
      color: #e8f4ff;
      box-sizing: border-box;
    }
    .static-topbar a { color: #7ce3ff; text-decoration: none; }
    .static-topbar a:hover { text-decoration: underline; }
    .static-topbar-title { font-weight: 700; color: #ffffff; }
    .static-site-footer {
      width: min(1100px, calc(100% - 24px));
      margin: 18px auto 22px auto;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255,255,255,.92);
      border: 1px solid rgba(19,61,93,.12);
      box-shadow: 0 12px 24px rgba(0,0,0,.10);
      color: #183149;
      box-sizing: border-box;
      text-align: center;
    }
    .static-site-footer a { color: #0f5f8f; text-decoration: none; }
    .static-site-footer a:hover { text-decoration: underline; }
    @media (max-width: 720px) {
      .static-topbar { flex-direction: column; align-items: flex-start; }
    }
  </style>

</head>
